  <line x1="340" y1="40" x2="340" y2="280" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.15" mask="url(#imagine-text-gaps-y8sykj)" style="fill:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

