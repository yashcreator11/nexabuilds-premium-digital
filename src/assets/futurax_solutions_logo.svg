  <text font-family="'Anthropic Sans', sans-serif" font-size="46" font-weight="500" fill="var(--color-text-primary)" x="285" y="124" letter-spacing="-1" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:46px;font-weight:500;text-anchor:start;dominant-baseline:auto">Futura</text>

