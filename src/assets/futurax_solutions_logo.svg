<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AFA9EC"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="fxGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AFA9EC"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7F77DD"/>
      <stop offset="70%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <mask id="imagine-text-gaps-y8sykj" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="320" fill="white"/><rect x="281" y="76.66519165039062" width="146.0843963623047" height="61.42409133911133" fill="black" rx="2"/><rect x="447" y="76.66519165039062" width="39.734365463256836" height="61.42409133911133" fill="black" rx="2"/><rect x="280.2444152832031" y="143.15513610839844" width="118.975830078125" height="19.867182731628418" fill="black" rx="2"/></mask></defs>

  <!-- Background subtle grid lines for futuristic feel -->
